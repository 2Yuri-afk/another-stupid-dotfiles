# ═══════════════════════════════════════════════════════════════════════════════
#  HYPRLAND CONFIG
# ═══════════════════════════════════════════════════════════════════════════════
#
#  Modular configuration — each section lives in its own file.
#  Edit individual files below to change specific settings.
#

# Color palette (Spirited Away Night)
source = ~/.config/hypr/colors.conf

# Monitor layout
source = ~/.config/hypr/monitors.conf

# Default applications ($terminal, $browser, etc.)
source = ~/.config/hypr/programs.conf

# Startup daemons & services
source = ~/.config/hypr/autostart.conf

# Environment variables & permissions
source = ~/.config/hypr/environment.conf

# Visual settings (general, decoration, animations, layouts, misc)
source = ~/.config/hypr/appearance.conf

# Keyboard, mouse, touchpad & device configs
source = ~/.config/hypr/input.conf

# All keybindings (apps, workspaces, multimedia, rofi)
source = ~/.config/hypr/keybinds.conf

# Window rules & layer rules
source = ~/.config/hypr/windowrules.conf
