#####################
### LOOK AND FEEL ###
#####################
# test
general {
    gaps_in  = 6
    gaps_out = 20

    border_size = 0
    workspace   = global

    # Use color variables from colors.conf
    col.active_border   = $active_border
    col.inactive_border = $inactive_border

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding = 0

    # Window transparency
    active_opacity     = 0.98
    inactive_opacity   = 0.93
    fullscreen_opacity = 1.0

    # Shadows
    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(10, 15, 20, 0.6)
        offset       = 0 4
        scale        = 1
    }

    # Blur
    blur {
        enabled           = true
        size              = 6
        passes            = 3
        new_optimizations = true
        xray              = false
        ignore_opacity    = false
        noise             = 0.02
        contrast          = 1.1
        brightness        = 1.0
        vibrancy          = 0.3
        vibrancy_darkness = 0.2
        popups            = true
        popups_ignorealpha = 0.6
    }

    # Dim inactive windows
    dim_inactive = true
    dim_strength = 0.1
    dim_special  = 0.4
}

animations {
    enabled = false

    bezier = fast, 0.5, 0.9, 0.3, 1.0

    animation = windows,    1, 2, fast
    animation = windowsOut, 1, 2, fast
    animation = fade,       1, 3, fast
    animation = workspaces, 1, 2, fast, slidevert
}

# Uncomment for "smart gaps" (no gaps when only one window)
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

dwindle {
    pseudotile     = true  # Bound to mainMod + D
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = true
}
