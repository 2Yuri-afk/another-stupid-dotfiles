context.modules = [
  {
    name = libpipewire-module-filter-chain
    args = {
      node.description = "Filtered Microphone (Gate + RNNoise)"
      media.name       = "Filtered Microphone (Gate + RNNoise)"
      filter.graph = {
        nodes = [
          {
            type  = ladspa
            name  = rnnoise
            plugin = "/usr/lib/ladspa/librnnoise_ladspa.so"
            label = "noise_suppressor_mono"
            control = { "VAD Threshold (%)" = 50.0 }
          }
        ]
        inputs  = [ "rnnoise:Input" ]
        outputs = [ "rnnoise:Output" ]
      }
      capture.props = {
        node.name      = "capture.filtered_mic"
        node.passive   = true
        audio.rate     = 48000
        audio.channels = 1
        audio.position = [ MONO ]
      }
      playback.props = {
        node.name      = "filtered_mic"
        media.class    = "Audio/Source"
        audio.rate     = 48000
        audio.channels = 1
        audio.position = [ MONO ]
      }
    }
  }
]
